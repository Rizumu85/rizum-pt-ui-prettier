<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pt Bridge - Perfected Typography</title>
<style>
    :root {
        /* Pro Dark Theme (Default) */
        --bg-app: #111111;
        --bg-window: #1b1b1b;
        --bg-column: #222222; 
        --border-color: #414141;
        --text-primary: #E0E0E0;
        --text-secondary: #9E9E9E;
        --text-tertiary: #666666;
        --accent-blue: #1473E6;
        
        --shadow-col: 0 4px 20px rgba(0,0,0,0.3);
        --hover-overlay: rgba(255, 255, 255, 0.05);
        --child-hover: rgba(255, 255, 255, 0.08);

        --panel-width: 580px;
        --top-height: 40px; 
        
        --line-margin: 12px;
        --radius-window: 10px;
        --radius-item: 6px;
        --radius-group: 8px;
        --btn-radius: 100px;
        
        --transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Apple Light Theme */
    [data-theme="light"] {
        --bg-app: #F2F2F7;
        --bg-window: #FFFFFF;
        --bg-column: #FFFFFF; 
        --border-color: #E5E5E5;
        --text-primary: #1D1D1F;
        --text-secondary: #86868B;
        --text-tertiary: #999999;
        --shadow-col: 0 8px 30px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04); 
        --hover-overlay: rgba(0, 0, 0, 0.03);
        --child-hover: rgba(0, 0, 0, 0.05);
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-app);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        transition: background 0.3s ease;
        -webkit-font-smoothing: antialiased;
    }

    .theme-toggle { margin-bottom: 20px; display: flex; gap: 10px; }
    .theme-btn {
        padding: 6px 16px; border-radius: 100px; border: 1px solid var(--border-color);
        background: var(--bg-window); color: var(--text-primary); cursor: pointer; font-size: 12px; font-weight: 600;
    }

    .bridge-window {
        width: var(--panel-width);
        background: var(--bg-window);
        border-radius: var(--radius-window);
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* --- Headers & Action Bar --- */
    .header, .action-bar {
        height: var(--top-height);
        display: flex; align-items: center; padding: 0 16px; position: relative;
    }
    .header { font-weight: 600; font-size: 13px; justify-content: space-between; }
    .header::after, .action-bar::after {
        content: ''; position: absolute; bottom: 0; left: var(--line-margin); right: var(--line-margin);
        height: 1px; background: var(--border-color);
    }

    .action-bar { justify-content: space-between; }
    .left-actions, .right-actions { display: flex; align-items: center; gap: 4px; }

    /* Dropdown Mixin */
    .mock-select {
        display: flex; align-items: center; justify-content: space-between; gap: 4px;
        width: auto; font-size: 12px; font-weight: 500; cursor: pointer; padding: 4px 8px;
        border-radius: 6px; transition: 0.15s;
    }
    .mock-select:hover { background: var(--hover-overlay); }
    .mock-select .icon { width: 10px; height: 10px; opacity: 0.6; }
    
    .select-label { color: var(--text-tertiary); font-weight: 400; }
    .select-value { color: var(--text-primary); }

    .icon-btn {
        width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
        border-radius: 6px; cursor: pointer; color: var(--text-secondary); transition: 0.15s;
    }
    .icon-btn:hover { background: var(--hover-overlay); color: var(--text-primary); }

    /* --- Main Content --- */
    .main-content {
        display: flex;
        padding: 16px;
        gap: 16px;
        flex: 1;
    }

    .column {
        flex: 1;
        background: var(--bg-column);
        border-radius: var(--radius-group);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 300px;
        box-shadow: var(--shadow-col);
        transition: all 0.3s ease;
        border: 1px solid var(--border-color); 
    }
    [data-theme="light"] .column { border: none; }

    /* --- 重点修复的标题层级 --- */
    .column-header {
        padding: 12px 16px 10px;
        display: flex; flex-direction: column; gap: 2px; position: relative;
    }
    .column-header::after {
        content: ''; position: absolute; bottom: 0; left: var(--line-margin); right: var(--line-margin);
        height: 1px; background: var(--border-color);
    }
    
    /* 大号醒目的 Source/Target 标题 */
    .column-title { 
        font-size: 12px; 
        font-weight: 700; 
        text-transform: uppercase; 
        letter-spacing: 0.05em; 
        color: var(--text-primary); 
    }
    
    /* 小号弱化的文件/通道副标题 */
    .column-sub { 
        font-size: 11px; 
        color: var(--text-tertiary); 
        font-weight: 500; 
    }

    /* --- Tree View Area --- */
    .tree-view { padding: 8px; flex: 1; overflow-y: auto; }

    .group-container {
        margin-bottom: 4px; border-radius: var(--radius-group); transition: background 0.2s ease; padding: 2px 0;
    }
    .group-container:hover { background: var(--hover-overlay); }

    .tree-item {
        display: flex; align-items: center; padding: 8px 10px; border-radius: var(--radius-item);
        cursor: pointer; gap: 10px; position: relative; transition: all 0.15s;
    }

    /* 子通道缩进 & Hover 框微型右边距 & 取消位移动效 */
    .child-item { 
        margin-left: 24px; 
        margin-right: 4px; 
        margin-bottom: 2px; 
    }
    .child-item:hover { 
        background: var(--child-hover) !important; 
        transform: none; 
    }

    /* Drag Handle & Remove Actions */
    .hover-action {
        position: absolute; right: 8px; width: 22px; height: 22px;
        display: flex; align-items: center; justify-content: center; border-radius: 4px;
        color: var(--text-tertiary); opacity: 0; transition: 0.15s;
    }
    .tree-item:hover .hover-action { opacity: 1; }
    .drag-handle { cursor: grab; }
    .remove-btn { font-size: 14px; font-weight: bold; }
    .remove-btn:hover { background: rgba(255, 69, 58, 0.1); color: #ff453a; }

    /* Icons */
    .icon { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }
    .icon-folder { color: var(--accent-blue); fill: currentColor; fill-opacity: 0.1; }
    .icon-layer { color: var(--text-secondary); }
    .chevron { width: 12px; height: 12px; transition: var(--transition); color: var(--text-secondary); }
    .expanded .chevron { transform: rotate(90deg); }
    
    .item-name { font-size: 13px; font-weight: 500; }

    /* Accordion */
    .content-wrapper { display: grid; grid-template-rows: 0fr; transition: var(--transition); }
    .expanded .content-wrapper { grid-template-rows: 1fr; }
    .content { overflow: hidden; }

    .svg-icon { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body data-theme="dark">

    <div class="theme-toggle">
        <button class="theme-btn" onclick="setTheme('light')">Apple Light</button>
        <button class="theme-btn" onclick="setTheme('dark')">Pro Dark</button>
    </div>

    <div class="bridge-window">
        <div class="header">
            <span>Pt Bridge</span>
            <svg class="svg-icon" style="cursor:pointer; opacity:0.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>

        <div class="action-bar">
            <div class="left-actions">
                <div class="mock-select" title="Target Texture Set">
                    <span class="select-label">Texture Set:</span>
                    <span class="select-value">M_Body</span>
                    <svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
                
                <div class="mock-select" title="Target Channel">
                    <span class="select-label">Channel:</span>
                    <span class="select-value">BaseColor</span>
                    <svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
            </div>

            <div class="right-actions">
                <div class="icon-btn" title="Undo"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></div>
                <div class="icon-btn" title="Redo"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 3.7"></path></svg></div>
                
                <div style="width: 1px; height: 14px; background: var(--border-color); margin: 0 4px;"></div>
                
                <div class="icon-btn" title="Apply Transfer" style="color: var(--accent-blue);">
                    <svg class="svg-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="column">
                <div class="column-header">
                    <span class="column-title">Source: Photoshop</span>
                    <span class="column-sub">BaseColor.psd</span>
                </div>
                <div class="tree-view">
                    <div class="group-container expanded">
                        <div class="tree-item" onclick="toggle(this)">
                            <svg class="icon chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            <svg class="icon icon-folder" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                            <span class="item-name">Body Textures</span>
                        </div>
                        <div class="content-wrapper">
                            <div class="content">
                                <div class="tree-item child-item">
                                    <svg class="icon icon-layer" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon></svg>
                                    <span class="item-name">Main_Layer</span>
                                    <div class="hover-action drag-handle">
                                        <svg width="12" height="16" viewBox="0 0 12 16" fill="currentColor"><circle cx="4" cy="2" r="1.5"/><circle cx="8" cy="2" r="1.5"/><circle cx="4" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="4" cy="14" r="1.5"/><circle cx="8" cy="14" r="1.5"/></svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="column-header">
                    <span class="column-title">Target: Painter</span>
                    <span class="column-sub">M_Body · BaseColor</span>
                </div>
                <div class="tree-view">
                    <div class="group-container expanded">
                        <div class="tree-item" onclick="toggle(this)">
                            <svg class="icon chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            <svg class="icon icon-folder" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                            <span class="item-name">Target Group</span>
                        </div>
                        <div class="content-wrapper">
                            <div class="content">
                                <div class="tree-item child-item">
                                    <svg class="icon icon-layer" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon></svg>
                                    <span class="item-name">Dirt_Overlay</span>
                                    <div class="hover-action remove-btn">×</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setTheme(theme) { document.body.setAttribute('data-theme', theme); }
        function toggle(el) { el.closest('.group-container').classList.toggle('expanded'); }
    </script>
</body>
</html>
